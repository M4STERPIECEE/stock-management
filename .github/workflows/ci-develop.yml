name: CI Develop

on:
  push:
    branches:
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ secrets.DB_USER || 'userdb' }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || 'password' }}
          POSTGRES_DB: ${{ secrets.DB_NAME || 'db' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Enable Corepack (pnpm)
      run: corepack enable

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: backend/pnpm-lock.yaml

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile
      working-directory: ./backend

    - name: Run Linter
      run: pnpm run lint
      working-directory: ./backend

    - name: Build Application
      run: pnpm run build
      working-directory: ./backend

    - name: Run Tests
      run: pnpm run test
      working-directory: ./backend
      env:
        DB_HOST: ${{ secrets.DB_HOST || 'localhost' }}
        DB_PORT: ${{ secrets.DB_PORT || '5432' }}
        DB_USER: ${{ secrets.DB_USER || 'userdb' }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'password' }}
        DB_NAME: ${{ secrets.DB_NAME || 'db' }}
