apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels: {{- include "stock.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          ports:
            - containerPort: {{ .Values.backend.port }}
          envFrom:
            - configMapRef: { name: stock-config }
            - secretRef: { name: stock-secrets }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: {{ .Values.backend.port }} }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: {{ .Values.backend.port }} }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources: {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels: {{- include "stock.labels" . | nindent 4 }}
spec:
  selector: { app: backend }
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
