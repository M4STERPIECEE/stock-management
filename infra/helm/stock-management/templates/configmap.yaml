apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-config
  labels: {{- include "stock.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.backend.port | quote }}
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: {{ .Values.config.dbName | quote }}
  THROTTLE_TTL: {{ .Values.config.throttleTtl | quote }}
  THROTTLE_LIMIT: {{ .Values.config.throttleLimit | quote }}
